<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JoacoGames | Central de Mando</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="jg-cyber-dark">
    <div class="bg-overlay"></div>

    <header class="jg-navbar">
        <div class="jg-container">
            <div class="jg-brand-hub" onclick="adminMode()">
                <div class="panther-hex"><img src="images/panther_logo.png" alt="JG"></div>
                <h1 class="jg-title-text">JOACO<span>GAMES</span></h1>
            </div>
            <div class="jg-profile-pill">
                <div class="stats-text">
                    <span id="userLevel">Nivel 1</span>
                    <span id="userPoints">0 XP</span>
                </div>
                <img src="images/avatar_joaco.jpg" alt="Admin" class="jg-user-img">
            </div>
        </div>
    </header>

    <main class="jg-dashboard">
        <div id="notificacionLogro" class="jg-notification">
            <span id="logroTitulo">🏆 ¡LOGRO DESBLOQUEADO!</span>
        </div>

        <section class="jg-hero-v2">
            <div class="hero-content">
                <span class="badge-new" id="novedadesText">[SISTEMA OPERATIVO JOACO v1.0]</span>
                <h1>Explora el Multiverso</h1>
                <div class="hero-btns">
                    <button class="btn-primary-neon" onclick="registrarPartida(true)">SIMULAR VICTORIA (+100 XP)</button>
                </div>
            </div>
        </section>

        <section class="jg-network-hub container">
            <h3>CONEXIONES (LINKTREE)</h3>
            <div class="social-links-container">
                <a href="https://linktr.ee/joacogames" target="_blank" class="link-node">🔗 LINKTREE_OFFICIAL</a>
                <a href="https://instagram.com/tu_user" target="_blank" class="link-node">📸 INSTAGRAM_LOG</a>
                <a href="https://discord.gg/tu_link" target="_blank" class="link-node">💬 DISCORD_SRV</a>
            </div>
        </section>

        <section class="jg-grid-section container">
            <h3>BIBLIOTECA DE PROYECTOS</h3>
            <div class="jg-cyber-grid" id="gameGrid">
                </div>
        </section>
    </main>

    <nav class="jg-bottom-nav">
        <a href="#" class="b-nav-item active">NÚCLEO</a>
        <a href="#comunidad" class="b-nav-item">REDES</a>
        <button onclick="addNewGame()" class="b-nav-item btn-add">+</button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
