<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JoacoGames | Central de Mando</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="jg-cyber-dark">
    <div class="bg-overlay"></div>

    <header class="jg-navbar">
        <div class="jg-container header-flex">
            <div class="jg-brand-hub" onclick="adminMode()">
                <div class="panther-hex"><img src="images/panther_logo.png" alt="JG"></div>
                <h1 class="jg-title-text">JOACO<span>GAMES</span></h1>
            </div>
            
            <div class="jg-profile-pill">
                <div class="stats-text">
                    <span id="userLevel">Nivel 1</span>
                    <span id="userPoints">0 XP</span>
                </div>
                <img src="images/avatar_joaco.jpg" alt="Admin" class="jg-user-img">
            </div>
        </div>
    </header>

    <main class="jg-dashboard">
        <div id="notificacionLogro" class="jg-notification">
            <span id="logroTitulo">🏆 ¡LOGRO DESBLOQUEADO!</span>
        </div>

        <section class="jg-hero">
            <div class="hero-banner-container">
                <img src="images/banner_juaco.jpg" alt="JoacoGames Banner" class="main-banner">
                <div class="hero-overlay">
                    <span class="badge-new" id="novedadesText">🔥 CARGANDO NÚCLEO...</span>
                    <h2>Tu Red Privada de Juegos</h2>
                    <button class="btn-primary-neon" onclick="registrarPartida(true)">INICIAR SIMULACIÓN</button>
                </div>
            </div>
        </section>

        <section class="jg-network-hub container">
            <h3 class="section-title">Nodos de Conexión</h3>
            <div class="social-grid">
                <a href="https://linktr.ee/joacogames" target="_blank" class="link-node">🔗 LINKTREE_HUB</a>
                <a href="https://instagram.com/tu_user" target="_blank" class="link-node">📸 INSTAGRAM_LOG</a>
                <a href="https://discord.gg/tu_link" target="_blank" class="link-node">💬 DISCORD_SRV</a>
            </div>
        </section>

        <section class="jg-grid-section container">
            <h3 class="section-title">Proyectos en el Sector</h3>
            <div id="emptyState" class="jg-empty-state">
                <div class="scanner-line"></div>
                <p>ESPERANDO ORDENES DEL ADMINISTRADOR</p>
                <span class="system-log">> No se detectan juegos comerciales en este sector.</span>
            </div>
            <div class="jg-cyber-grid" id="gameGrid"></div>
        </section>
    </main>

    <nav class="jg-bottom-nav">
        <a href="#" class="b-nav-item active">NÚCLEO</a>
        <button onclick="addNewGame()" class="btn-add-game">+</button>
        <a href="#" class="b-nav-item">PERFIL</a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
