<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JoacoGames | Mobile Core</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="jg-cyber-dark">

    <div class="bg-overlay"></div>

    <header class="jg-navbar">
        <div class="jg-container">
            <div class="jg-brand-hub" onclick="adminMode()">
                <div class="panther-hex">
                    <img src="images/panther_logo.png" alt="JoacoGames">
                </div>
                <h1 class="jg-title-text">JOACO<span>GAMES</span></h1>
            </div>
            
            <div class="jg-profile-mini">
                <img src="images/avatar_joaco.jpg" alt="Joaco" class="jg-user-img">
            </div>
        </div>
    </header>

    <main class="jg-dashboard">
        <section class="jg-hero-v2">
            <div class="hero-content">
                <span class="badge-new">SISTEMA MÓVIL ACTIVO</span>
                <h2>Núcleo de Mando</h2>
                <div class="hero-btns">
                    <button class="btn-primary-neon" onclick="addNewGame()">+ PROYECTO</button>
                </div>
            </div>
        </section>

        <section class="jg-network-hub">
            <div class="section-header">
                <h3>ENLACES DE NÚCLEO (LINKTREE)</h3>
            </div>
            <div class="social-links-container">
                <a href="https://linktr.ee/joacogames" target="_blank" class="link-node">
                    <span class="node-icon">🔗</span> LINKTREE_OFFICIAL
                </a>
                <a href="https://www.instagram.com/tu_usuario" target="_blank" class="link-node">
                    <span class="node-icon">📸</span> INSTAGRAM_LOG
                </a>
                <a href="https://discord.gg/tu_invitacion" target="_blank" class="link-node">
                    <span class="node-icon">💬</span> DISCORD_SRV
                </a>
            </div>
        </section>

        <section class="jg-grid-section">
            <div class="section-header">
                <h2>BASE DE DATOS</h2>
                <div class="jg-line-decorator"></div>
            </div>
            
            <div class="jg-empty-state" id="emptyState">
                <div class="panther-scanner"></div>
                <p>ESPERANDO INYECCIÓN DE DATOS...</p>
            </div>

            <div class="jg-cyber-grid" id="gameGrid"></div>
        </section>
    </main>

    <nav class="jg-bottom-nav">
        <a href="#" class="b-nav-item active">NÚCLEO</a>
        <a href="#comunidad" class="b-nav-item">REDES</a>
        <a href="#" class="b-nav-item">PERFIL</a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
