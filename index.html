<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoacoGames | Central de Mando</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="jg-cyber-dark">

    <div class="bg-overlay"></div>

    <header class="jg-navbar">
        <div class="jg-container">
            <div class="jg-brand-hub">
                <div class="panther-hex">
                    <img src="images/panther_logo.png" alt="JoacoGames">
                </div>
                <div class="jg-title">
                    <span class="glitch" data-text="JOACOGAMES">JOACOGAMES</span>
                </div>
            </div>

            <nav class="jg-nav-links">
                <a href="#" class="nav-item active">NÚCLEO</a>
                <a href="#" class="nav-item">RED SOCIAL</a>
                <a href="#" class="nav-item">ARCHIVOS</a>
                <a href="#" class="nav-item">SOPORTE</a>
            </nav>

            <div class="jg-profile-pill">
                <span class="jg-rank">Nivel 99</span>
                <img src="images/avatar_joaco.jpg" alt="Admin" class="jg-user-img">
                <div class="jg-online-pulse"></div>
            </div>
        </div>
    </header>

    <main class="jg-dashboard">
        <section class="jg-hero-v2">
            <div class="hero-content">
                <span class="badge-new">NUEVA MISIÓN DISPONIBLE</span>
                <h1>Explora el multiverso de Joaco</h1>
                <p>Tu red privada de juegos, amigos y pura potencia.</p>
                <div class="hero-btns">
                    <button class="btn-primary-neon">LANZAR ÚLTIMO JUEGO</button>
                    <button class="btn-secondary-outline">VER BIBLIOTECA</button>
                </div>
            </div>
            <div class="hero-visual">
                <div class="floating-j">
                    <img src="images/banner_juaco.jpg" alt="Joaco Brand">
                </div>
            </div>
        </section>

        <section class="jg-grid-section">
            <div class="section-header">
                <h2>Últimas Adquisiciones</h2>
                <div class="jg-line-decorator"></div>
            </div>
            
            <div class="jg-cyber-grid" id="gameGrid">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
