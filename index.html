<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOACOGAMES | NÚCLEO</title>
    <style>
        :root {
            --epic-blue: #0078f2;
            --steam-dark: #171a21;
            --steam-gradient: linear-gradient(135deg, #2a475e 0%, #1b2838 100%);
            --accent-gold: #c7d5e0;
        }

        body {
            background-color: #121212; /* Fondo Epic */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #launcher-container {
            width: 900px;
            background: var(--steam-dark);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        header {
            background: var(--steam-gradient);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--epic-blue);
        }

        .user-stats {
            text-align: right;
        }

        .xp-bar {
            width: 200px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin-top: 5px;
        }

        .xp-progress {
            width: 45%; /* Dinámico */
            height: 100%;
            background: var(--epic-blue);
            box-shadow: 0 0 10px var(--epic-blue);
        }

        nav {
            background: #202020;
            padding: 10px 20px;
        }

        nav a {
            color: var(--accent-gold);
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        nav a:hover { color: white; }

        main {
            padding: 30px;
        }

        .card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 4px;
            border-left: 4px solid var(--epic-blue);
        }

        .btn-victory {
            background: var(--epic-blue);
            color: white;
            border: none;
            padding: 12px 24px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-victory:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .footer-sync {
            background: #101010;
            padding: 10px 20px;
            font-size: 0.8em;
            color: #666;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div id="launcher-container">
    <header>
        <div>
            <h1 style="margin:0; letter-spacing: 2px;">JOACOGAMES</h1>
            <span style="font-size: 0.7em; color: var(--epic-blue);">SISTEMA ACTIVO v2.0</span>
        </div>
        <div class="user-stats">
            <strong>ADMIN</strong> <br>
            <span style="font-size: 0.8em;">NIVEL 1</span>
            <div class="xp-bar"><div class="xp-progress"></div></div>
        </div>
    </header>

    <nav>
        <a href="#">NÚCLEO</a>
        <a href="#">BIBLIOTECA</a>
        <a href="#">RED SOCIAL</a>
        <a href="#">SOPORTE</a>
    </nav>

    <main>
        <section class="card">
            <h2>NÚCLEO DE MANDO</h2>
            <p style="color: #aaa;">Plataforma privada para la familia y amigos de JoacoGames.</p>
            <button class="btn-victory" onclick="simular()">SIMULAR VICTORIA (+100 XP)</button>
        </section>

        <h3 style="margin-top: 30px;">CONEXIONES</h3>
        <div style="display: flex; gap: 10px;">
            <code style="background: #000; padding: 5px;">DISCORD_SRV</code>
            <code style="background: #000; padding: 5px;">INTEL_GRAM</code>
        </div>
    </main>

    <div class="footer-sync">
        <span>BASE DE DATOS: CONECTADA</span>
        <span>SINCRONIZACIÓN COMPLETADA 100%</span>
    </div>
</div>

<script>
    function simular() {
        alert("Sincronizando datos con el servidor central...");
        // Aquí podrías añadir lógica para aumentar el ancho de .xp-progress
    }
</script>

</body>
</html>
